<html>
    <head>
        <meta charset="UTF-8">
        <title>Calculadora Ulima</title>
        <link rel="stylesheet" href="css/estilos.css">
        <script src="js/script.js"></script>
    </head>
    <body>
        <div class="calculadora">
            <h1>Calculadora</h1>
            <label for="num1">Número 1</label><br>
            <input type="number" id="num1" value="0"><br>
            
            <label for="num2">Número 2</label><br>
            <input type="number" id="num2" value="0"><br><br>
            
            <button id="op-sum">+</button>
            <button id="op-res">-</button>
            <button id="op-mult">*</button>
            <button id="op-div">/</button>
            <button id="op-mod">%</button> 
            <button id="op-clear" class="btn-clear">C</button>
            
            <br><br>
            <div class="caja-resultado">
                Resultado: <span id="resultado">0</span>
            </div>
        </div>
    </body>
</html>
